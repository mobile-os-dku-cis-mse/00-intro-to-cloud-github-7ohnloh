<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f6f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #2f3437;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .error-code {
      font-size: 80px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .message {
      color: #6b6f76;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #2f3437;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #444;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="error-code">404</div>
    <div class="title">Page not found</div>
    <div class="message">
      The page you're looking for doesn’t exist or was moved.
    </div>

    <a href="index.html" class="btn">Go back home</a>
  </div>

</body>
</html>
